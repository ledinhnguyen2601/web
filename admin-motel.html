<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chủ Trọ - Quản lý</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <i class="fas fa-home"></i> Quản lý Xóm Trọ
        </div>
        <ul class="nav-menu">
          <li class="active">
            <a href="#"><i class="fas fa-bolt"></i> Chốt Điện / Nước</a>
          </li>
          <li>
            <a href="#"><i class="fas fa-door-open"></i> Danh sách Phòng</a>
          </li>
          <li>
            <a href="#"><i class="fas fa-wrench"></i> Báo hỏng (Mới)</a>
          </li>
        </ul>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <h2 style="font-size: 1.1rem; color: var(--text-main)">
            Bảng điều khiển
          </h2>
          <div style="display: flex; align-items: center; gap: 15px">
            <span style="font-weight: 600; font-size: 0.9rem"
              >Chủ trọ Admin</span
            >
            <button
              class="btn btn-outline logout-btn"
              style="padding: 5px 10px; font-size: 0.85rem; width: auto"
            >
              Đăng xuất
            </button>
          </div>
        </header>

        <div class="container" style="padding-top: 30px">
          <div
            style="
              display: grid;
              grid-template-columns: repeat(3, 1fr);
              gap: 20px;
              margin-bottom: 20px;
            "
          >
            <div class="card">
              <label>Phòng đang thuê</label>
              <h3 style="font-size: 1.5rem; color: var(--primary-color)">
                12
                <span
                  style="
                    font-size: 0.9rem;
                    font-weight: normal;
                    color: var(--text-muted);
                  "
                  >/ 15</span
                >
              </h3>
            </div>
            <div class="card">
              <label>Hóa đơn chờ thu</label>
              <h3 style="font-size: 1.5rem; color: var(--text-main)">3 Đơn</h3>
            </div>
            <div class="card">
              <label>Sự cố cần xử lý</label>
              <h3 style="font-size: 1.5rem; color: var(--text-main)">
                1 Báo cáo
              </h3>
            </div>
          </div>

          <div class="card">
            <h3
              style="
                margin-bottom: 15px;
                font-size: 1.1rem;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
              "
            >
              Chốt Số Điện Nước Tháng Này
            </h3>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Phòng</th>
                    <th>Số Điện (Cũ &rarr; Mới)</th>
                    <th>Số Nước (Cũ &rarr; Mới)</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>
                      <strong>P.101</strong><br /><span
                        style="font-size: 0.8rem; color: var(--text-muted)"
                        >Nguyễn Văn A</span
                      >
                    </td>
                    <td>
                      <div style="display: flex; gap: 5px; align-items: center">
                        <input
                          type="number"
                          value="2100"
                          disabled
                          style="width: 80px; margin: 0; background: #f1f5f9"
                        />
                        &rarr;
                        <input
                          type="number"
                          placeholder="Số mới"
                          style="width: 80px; margin: 0"
                        />
                      </div>
                    </td>
                    <td>
                      <div style="display: flex; gap: 5px; align-items: center">
                        <input
                          type="number"
                          value="150"
                          disabled
                          style="width: 80px; margin: 0; background: #f1f5f9"
                        />
                        &rarr;
                        <input
                          type="number"
                          placeholder="Số mới"
                          style="width: 80px; margin: 0"
                        />
                      </div>
                    </td>
                    <td>
                      <span
                        style="
                          font-size: 0.85rem;
                          font-weight: bold;
                          color: var(--text-muted);
                        "
                        >Chưa chốt</span
                      >
                    </td>
                    <td>
                      <div style="display: flex; gap: 5px">
                        <button
                          class="btn btn-outline"
                          style="padding: 6px; font-size: 0.8rem; width: auto"
                        >
                          <i class="fas fa-image"></i> Ảnh
                        </button>
                        <button
                          class="btn btn-primary"
                          style="
                            padding: 6px 10px;
                            font-size: 0.8rem;
                            width: auto;
                          "
                        >
                          Xuất Bill
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
