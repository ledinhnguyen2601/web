<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>BQL Chung Cư</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <i class="fas fa-city"></i> BQL Chung Cư
        </div>
        <ul class="nav-menu">
          <li class="active">
            <a href="#" onclick="switchTab('tab-tongquan', this)"
              ><i class="fas fa-chart-pie"></i> Tổng quan</a
            >
          </li>
          <li>
            <a href="#" onclick="switchTab('tab-cudan', this)"
              ><i class="fas fa-users"></i> Quản lý Cư dân</a
            >
          </li>
          <li>
            <a href="#" onclick="switchTab('tab-xe', this)"
              ><i class="fas fa-car"></i> Đăng ký Bãi xe</a
            >
          </li>
          <li>
            <a href="#" onclick="switchTab('tab-thongbao', this)"
              ><i class="fas fa-bullhorn"></i> Phát Thông báo</a
            >
          </li>
        </ul>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <h2 style="font-size: 1.1rem">Hệ thống Tòa nhà Hoa Sen</h2>
          <button
            class="btn btn-outline logout-btn"
            style="padding: 5px 10px; font-size: 0.85rem; width: auto"
          >
            Đăng xuất
          </button>
        </header>

        <div class="container" style="padding-top: 20px">
          <div id="tab-tongquan" class="content-section">
            <div
              style="
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                margin-bottom: 20px;
              "
            >
              <div class="card">
                <label>Tổng số căn hộ</label>
                <h3 style="font-size: 1.5rem; color: var(--primary-color)">
                  45 Căn
                </h3>
              </div>
              <div class="card">
                <label>Phương tiện đăng ký</label>
                <h3 style="font-size: 1.5rem; color: var(--text-main)">
                  82 Xe máy
                </h3>
              </div>
            </div>
          </div>

          <div id="tab-cudan" class="content-section" style="display: none">
            <div class="card"><h3>Quản lý Cư dân (Đang cập nhật)</h3></div>
          </div>

          <div id="tab-xe" class="content-section" style="display: none">
            <div class="card">
              <h3 style="margin-bottom: 15px">
                Danh sách Phương tiện Đã Đăng ký
              </h3>
              <div class="table-responsive">
                <table>
                  <thead>
                    <tr>
                      <th>Căn hộ</th>
                      <th>Chủ xe</th>
                      <th>Biển số</th>
                      <th>Loại xe</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td><strong>Căn 301</strong></td>
                      <td>Anh Tuấn</td>
                      <td>
                        <strong style="color: var(--primary-color)"
                          >29A1-123.45</strong
                        >
                      </td>
                      <td>Honda Vision</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <div id="tab-thongbao" class="content-section" style="display: none">
            <div class="card">
              <h3 style="margin-bottom: 15px">Phát Thông Báo Mới</h3>
              <input type="text" placeholder="Tiêu đề thông báo..." />
              <textarea
                rows="4"
                placeholder="Nội dung (Ví dụ: Lịch cắt điện...)"
              ></textarea>
              <button
                class="btn btn-primary"
                onclick="alert('Đã phát thông báo!')"
              >
                Phát thông báo
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="js/auth.js"></script>
    <script>
      function switchTab(tabId, element) {
        document
          .querySelectorAll(".content-section")
          .forEach((sec) => (sec.style.display = "none"));
        document
          .querySelectorAll(".nav-menu li")
          .forEach((li) => li.classList.remove("active"));
        document.getElementById(tabId).style.display = "block";
        element.parentElement.classList.add("active");
      }
    </script>
  </body>
</html>
