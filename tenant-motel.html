<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Khách Thuê Trọ</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-brand"><i class="fas fa-user"></i> Khách Thuê</div>
        <ul class="nav-menu">
          <li class="active">
            <a href="#"
              ><i class="fas fa-file-invoice-dollar"></i> Hóa đơn & Báo số</a
            >
          </li>
          <li>
            <a href="#"><i class="fas fa-tools"></i> Báo cáo Sự cố</a>
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <h2 style="font-size: 1.1rem; color: var(--text-main)">
            Phòng đang ở: P.101
          </h2>
          <div style="display: flex; align-items: center; gap: 15px">
            <span style="font-size: 0.9rem; font-weight: 600"
              >Nguyễn Văn A</span
            >
            <button
              class="btn btn-outline logout-btn"
              style="width: auto; padding: 5px 15px"
            >
              Đăng xuất
            </button>
          </div>
        </header>

        <div class="container" style="padding-top: 30px; max-width: 800px">
          <div class="card" style="margin-bottom: 20px">
            <h3
              style="
                margin-bottom: 15px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
                color: var(--text-main);
              "
            >
              <i class="fas fa-bolt"></i> Khai báo Chỉ số Điện/Nước
            </h3>

            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 15px;
              "
            >
              <div
                style="
                  background: var(--bg-light);
                  padding: 15px;
                  border-radius: 6px;
                  border: 1px solid var(--border-color);
                "
              >
                <strong
                  style="
                    display: block;
                    margin-bottom: 10px;
                    color: var(--text-main);
                  "
                  >CHỈ SỐ ĐIỆN</strong
                >
                <label>Số cũ (Tháng trước)</label>
                <input
                  type="number"
                  placeholder="Nhập số cũ..."
                  value="2100"
                  disabled
                  style="background: #e2e8f0; cursor: not-allowed"
                />
                <label>Số mới (Tháng này)</label>
                <input
                  type="number"
                  placeholder="Nhập số mới trên đồng hồ..."
                />
              </div>
              <div
                style="
                  background: var(--bg-light);
                  padding: 15px;
                  border-radius: 6px;
                  border: 1px solid var(--border-color);
                "
              >
                <strong
                  style="
                    display: block;
                    margin-bottom: 10px;
                    color: var(--text-main);
                  "
                  >CHỈ SỐ NƯỚC</strong
                >
                <label>Số cũ (Tháng trước)</label>
                <input
                  type="number"
                  placeholder="Nhập số cũ..."
                  value="150"
                  disabled
                  style="background: #e2e8f0; cursor: not-allowed"
                />
                <label>Số mới (Tháng này)</label>
                <input
                  type="number"
                  placeholder="Nhập số mới trên đồng hồ..."
                />
              </div>
            </div>

            <label>Tải ảnh chụp đồng hồ minh chứng</label>
            <input
              type="file"
              accept="image/*"
              style="border: none; padding: 0"
            />
            <button
              class="btn btn-primary"
              onclick="alert('Đã gửi chỉ số và ảnh cho Chủ trọ thành công!')"
            >
              Gửi dữ liệu Chốt sổ
            </button>
          </div>

          <div class="card">
            <h3
              style="
                margin-bottom: 15px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 10px;
                color: var(--text-main);
              "
            >
              <i class="fas fa-exclamation-triangle"></i> Gửi Yêu Cầu Hỗ Trợ /
              Báo Lỗi
            </h3>

            <label>Phân loại sự cố</label>
            <select
              id="issueType"
              onchange="
                document.getElementById('otherIssue').style.display =
                  this.value === 'khac' ? 'block' : 'none'
              "
            >
              <option value="dien">Sự cố Điện (Chập, cháy bóng...)</option>
              <option value="nuoc">Sự cố Nước (Rò rỉ, tắc ống...)</option>
              <option value="internet">Mạng Internet / Wifi</option>
              <option value="anninh">An ninh trật tự</option>
              <option value="vesinh">Vệ sinh chung</option>
              <option value="khac">Vấn đề Khác...</option>
            </select>

            <div id="otherIssue" style="display: none">
              <label>Vui lòng ghi rõ lỗi:</label>
              <input type="text" placeholder="Nhập vấn đề của bạn..." />
            </div>

            <label>Chi tiết tình trạng</label>
            <textarea
              rows="3"
              placeholder="Mô tả cụ thể để thợ dễ dàng xử lý..."
            ></textarea>

            <button
              class="btn btn-outline"
              onclick="alert('Đã gửi báo cáo cho Quản lý!')"
            >
              Gửi Báo Cáo
            </button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
